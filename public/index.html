<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Chronicle</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/gridstack/dist/gridstack.min.css" />
  <link rel="stylesheet" href="styles.css" />
  <!-- Apply saved theme before paint to avoid flash -->
  <script>
    const t = localStorage.getItem("dashboard-theme");
    if (t) document.documentElement.setAttribute("data-theme", t);
  </script>
</head>
<body>
  <header>
    <div class="header-inner">
      <div class="header-brand">
        <h1 class="brand-name"><span class="brand-deco">✦</span> The Chronicle <span class="brand-deco">✦</span></h1>
        <p class="brand-sub"><span id="greeting"></span><span class="brand-sep"> · </span><span id="date-line"></span></p>
      </div>
      <div class="header-actions">
        <select id="theme-select" title="Switch theme">
          <option value="dark">Dark</option>
          <option value="light">Light</option>
          <option value="paper">Paper</option>
          <option value="nord">Nord</option>
          <option value="solarized">Solarized</option>
          <option value="mocha">Catppuccin Mocha</option>
          <option value="rose">Rosé Pine</option>
          <option value="gruvbox">Gruvbox</option>
        </select>
        <button id="reset-btn">⊞ Reset layout</button>
        <button id="refresh-btn">↻ Refresh</button>
        <button id="settings-btn" title="Settings">⚙ Settings</button>
      </div>
    </div>
  </header>

  <main>
    <div class="grid-stack" id="grid"></div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/gridstack/dist/gridstack-all.js"></script>
  <script type="module" src="app.js"></script>
  <script type="module" src="settings.js"></script>
  <script type="module" src="onboarding.js"></script>
</body>
</html>
